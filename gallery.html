<head>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Internal CSS -->
  <style>
    :root {
      --dark-blue: #0a192f;
      --light-blue: #112240;
      --lightest-blue: #233554;
      --lightest-slate: #ccd6f6;
      --slate: #8892b0;
      --accent-color: #64ffda;
      --font-main: 'Poppins', sans-serif;
    }

    body {
      font-family: var(--font-main);
      background-color: var(--dark-blue);
      color: var(--slate);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* --- Navbar --- */
    .navbar {
      background-color: rgba(10, 25, 47, 0.85);
      backdrop-filter: blur(12px);
      box-shadow: 0 4px 30px rgba(2, 12, 27, 0.7);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      padding: 15px 0;
    }

    .navbar-brand {
      font-weight: 700;
      color: var(--lightest-slate) !important;
      letter-spacing: 0.5px;
    }
    
    .navbar .nav-link {
      color: var(--lightest-slate);
      font-weight: 500;
      font-size: 0.95rem;
      margin: 0 10px;
      position: relative;
      transition: color 0.3s ease;
    }
    
    .navbar .nav-link:hover, .navbar .nav-link.active {
      color: var(--accent-color);
    }

    /* Animated Underline for Nav Links */
    .navbar .nav-link::after {
      content: '';
      position: absolute;
      width: 0;
      height: 2px;
      display: block;
      margin-top: 4px;
      right: 0;
      background: var(--accent-color);
      transition: width 0.3s ease, right 0.3s ease;
    }

    .navbar .nav-link:hover::after, .navbar .nav-link.active::after {
      width: 100%;
      left: 0;
    }

    /* --- General Section Styling --- */
    .section {
      padding: 90px 20px;
    }
    
    .page-header {
      padding-top: 140px;
      padding-bottom: 20px;
    }

    .section-title {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 20px;
      color: var(--lightest-slate);
      position: relative;
      display: inline-block;
      letter-spacing: -0.5px;
    }

    .section-title::after {
      content: '';
      position: absolute;
      width: 60%;
      height: 3px;
      background: var(--accent-color);
      bottom: -12px;
      left: 50%;
      transform: translateX(-50%);
      border-radius: 2px;
    }

    .text-gradient {
      background: linear-gradient(90deg, var(--lightest-slate), var(--slate));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* --- Gallery Grid --- */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 25px;
      padding-top: 40px;
    }

    .gallery-item {
        border-radius: 12px;
        overflow: hidden;
        position: relative;
        cursor: pointer;
        aspect-ratio: 4 / 3;
        background-color: var(--light-blue);
        box-shadow: 0 4px 20px rgba(2, 12, 27, 0.5);
        opacity: 0;
        transform: translateY(30px);
        transition: opacity 0.6s cubic-bezier(0.25, 0.8, 0.25, 1), 
                    transform 0.6s cubic-bezier(0.25, 0.8, 0.25, 1),
                    box-shadow 0.3s ease;
        will-change: opacity, transform;
    }

    .gallery-grid.is-visible .gallery-item {
        opacity: 1;
        transform: translateY(0);
    }

    .gallery-item:hover {
        box-shadow: 0 15px 30px rgba(2, 12, 27, 0.8), 0 0 15px rgba(100, 255, 218, 0.1);
        z-index: 2;
    }
    
    .gallery-image {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.6s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    .gallery-item:hover .gallery-image {
        transform: scale(1.08);
    }

    /* Overlay on Hover */
    .gallery-overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(10, 25, 47, 0.6);
      backdrop-filter: blur(2px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .gallery-item:hover .gallery-overlay {
      opacity: 1;
    }

    .expand-icon {
      color: var(--accent-color);
      width: 40px;
      height: 40px;
      margin-bottom: 10px;
      transform: translateY(20px);
      transition: transform 0.3s ease;
    }

    .gallery-item:hover .expand-icon {
      transform: translateY(0);
    }

    .overlay-text {
      color: var(--lightest-slate);
      font-weight: 500;
      letter-spacing: 1px;
      transform: translateY(20px);
      transition: transform 0.3s ease;
    }

    .gallery-item:hover .overlay-text {
      transform: translateY(0);
    }
    
    /* --- Lightbox Modal --- */
    .modal-backdrop.show {
        opacity: 0.9;
        background-color: var(--dark-blue);
    }
    .modal-content {
        background-color: transparent;
        border: none;
        position: relative;
    }
    .modal-body {
        padding: 0;
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
    }
    .modal-img-wrapper {
        position: relative;
        background: var(--light-blue); /* placeholder while loading */
        min-height: 300px; 
    }
    #modalImage {
        width: 100%;
        height: auto;
        display: block;
    }
    .custom-close-btn {
        position: absolute;
        top: -40px;
        right: 0;
        background: none;
        border: none;
        color: var(--accent-color);
        font-size: 2rem;
        cursor: pointer;
        transition: color 0.3s;
        z-index: 1060;
    }
    .custom-close-btn:hover {
        color: var(--lightest-slate);
    }

    /* --- Footer --- */
    footer {
      background-color: #050d1a;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      padding: 25px 0;
    }

    footer p {
      font-size: 0.9rem;
      letter-spacing: 0.5px;
    }

    /* Mobile Responsive adjustments */
    @media (max-width: 768px) {
      .gallery-grid {
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      }
      .custom-close-btn {
        top: -35px;
        right: 10px;
      }
    }
  </style>
</head>

  <!-- Internal JS -->
  <script>
    // --- Lightbox Functionality ---
    const galleryModal = document.getElementById('galleryModal');
    const modalImage = document.getElementById('modalImage');

    galleryModal.addEventListener('show.bs.modal', function (event) {
      // Button that triggered the modal
      const triggerElement = event.relatedTarget;
      // Get the high-res image source
      const imageSrc = triggerElement.getAttribute('data-img-src');
      // Set image source
      modalImage.src = imageSrc;
    });

    // Clear image src when modal closes to prevent layout jumps on next open
    galleryModal.addEventListener('hidden.bs.modal', function () {
      modalImage.src = "";
    });

    // --- Scroll-triggered Fade-in Animation ---
    const observerOptions = {
      root: null,
      rootMargin: '0px',
      threshold: 0.1
    };

    const observer = new IntersectionObserver((entries, observer) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) {
          entry.target.classList.add('is-visible');
          observer.unobserve(entry.target); // Stop observing once visible
        }
      });
    }, observerOptions);

    // Target the grid container instead of individual items 
    // to trigger the staggered CSS delay perfectly
    const gridContainer = document.getElementById('galleryGrid');
    if (gridContainer) {
      observer.observe(gridContainer);
    }
  </script>
