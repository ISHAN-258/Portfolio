<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gallery | Ishan Tripathi</title>

  <!-- Bootstrap CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <!-- Internal CSS -->
  <style>
    :root {
      --dark-blue: #0a192f;
      --light-blue: #112240;
      --lightest-slate: #ccd6f6;
      --slate: #8892b0;
      --accent-color: #64ffda;
      --font-main: 'Poppins', sans-serif;
    }

    body {
      font-family: var(--font-main);
      background-color: var(--dark-blue);
      color: var(--slate);
    }

    /* --- Navbar --- */
    .navbar {
      background-color: rgba(10, 25, 47, 0.85);
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px -10px rgba(2,12,27,0.7);
    }

    .navbar-brand {
      font-weight: 600;
      color: var(--lightest-slate) !important;
    }
    
    .navbar .nav-link {
      color: var(--lightest-slate);
      transition: color 0.3s;
    }
    
    .navbar .nav-link:hover, .navbar .nav-link.active {
      color: var(--accent-color);
    }

    /* --- General Section Styling --- */
    .section {
      padding: 100px 20px;
    }
    
    .page-header {
      padding-top: 120px;
      padding-bottom: 60px;
    }

    .section-title {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 40px;
      color: var(--lightest-slate);
      position: relative;
      display: inline-block;
    }

    .section-title::after {
      content: '';
      display: block;
      width: 50px;
      height: 4px;
      background: var(--accent-color);
      margin-top: 10px;
    }

    /* --- Gallery --- */
    .gallery-item {
        border-radius: 8px;
        overflow: hidden;
        position: relative;
        cursor: pointer;
        box-shadow: 0 10px 30px -15px rgba(2,12,27,0.7);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        opacity: 0;
        transform: translateY(20px);
        transition: opacity 0.6s ease-out, transform 0.6s ease-out;
        transition-delay: var(--delay);
    }

    .is-visible .gallery-item {
        opacity: 1;
        transform: translateY(0);
    }

    .gallery-item:hover {
        transform: scale(1.03);
        box-shadow: 0 0 25px -5px rgba(100, 255, 218, 0.3);
    }
    
    .gallery-image {
        width: 100%;
        height: 280px;
        object-fit: cover;
        transition: transform 0.4s ease;
    }

    .gallery-item:hover .gallery-image {
        transform: scale(1.1);
    }
    
    /* --- Lightbox Modal --- */
    .modal-content {
        background-color: transparent;
        border: none;
    }
    .modal-body {
        padding: 0;
    }
    .modal-header {
        border-bottom: none;
        position: absolute;
        top: 15px;
        right: 15px;
        z-index: 1056; /* Above the image */
    }
    .btn-close {
        background-color: var(--accent-color);
        border-radius: 50%;
        padding: 0.5em;
    }

    /* --- Footer --- */
    footer {
      background-color: #081428;
      color: var(--slate);
    }

    /* --- Animations --- */
    .fade-in-section {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.8s ease-out, transform 0.8s ease-out;
    }
    
    .fade-in-section.is-visible {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
      <a class="navbar-brand" href="index.html">Ishan 🚀</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
          <li class="nav-item"><a class="nav-link" href="skills.html">Skills</a></li>
          <li class="nav-item"><a class="nav-link" href="projects.html">Projects</a></li>
          <li class="nav-item"><a class="nav-link active" href="gallery.html">Gallery</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Gallery Section -->
  <section class="section page-header">
    <div class="container text-center">
      <h1 class="section-title">My Gallery</h1>
      <p class="fs-5 lead" style="max-width: 700px; margin: auto;">A glimpse into my world of tech, creativity, and everyday life.</p>
    </div>
  </section>

  <section class="section pt-0">
    <div class="container">
      <div class="row g-4 fade-in-section">

        <!-- Image 1: Workspace -->
        <div class="col-lg-4 col-md-6">
          <div class="gallery-item" data-bs-toggle="modal" data-bs-target="#galleryModal" data-img-src="https://images.unsplash.com/photo-1555949963-ff98c872d82b?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80" style="--delay: 0.1s;">
            <img src="https://preview.redd.it/my-workspace-v0-7bvbd0fq5gqd1.jpeg?auto=webp&s=a4f255f5a2ad6365a2981989ecc0b299b74187f9" alt="My Workspace" class="gallery-image">
          </div>
        </div>

        <!-- Image 2: Code -->
        <div class="col-lg-4 col-md-6">
          <div class="gallery-item" data-bs-toggle="modal" data-bs-target="#galleryModal" data-img-src="https://images.unsplash.com/photo-1542831371-29b0f74f9713?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80" style="--delay: 0.2s;">
            <img src="https://images.unsplash.com/photo-1542831371-29b0f74f9713?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=60" alt="Code on Screen" class="gallery-image">
          </div>
        </div>

        <!-- Image 3: Creative / Editing -->
        <div class="col-lg-4 col-md-6">
          <div class="gallery-item" data-bs-toggle="modal" data-bs-target="#galleryModal" data-img-src="https://images.unsplash.com/photo-1505330622279-bf7d7fc918f4?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80" style="--delay: 0.3s;">
            <img src="https://images.unsplash.com/photo-1505330622279-bf7d7fc918f4?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=60" alt="Creative Setup" class="gallery-image">
          </div>
        </div>

        <!-- Image 4: Varanasi / Travel -->
        <div class="col-lg-4 col-md-6">
          <div class="gallery-item" data-bs-toggle="modal" data-bs-target="#galleryModal" data-img-src="https://images.unsplash.com/photo-1561361522-589571981d34?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80" style="--delay: 0.4s;">
            <img src="https://kashi.gov.in/cmsadmin/getApiFile/CMS/64924548f2fec1687307592~jpg" alt="Varanasi Ghat" class="gallery-image">
          </div>
        </div>

        <!-- Image 5: Tech / Hardware -->
        <div class="col-lg-4 col-md-6">
          <div class="gallery-item" data-bs-toggle="modal" data-bs-target="#galleryModal" data-img-src="https://images.unsplash.com/photo-1593640408182-31c70c8268f5?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80" style="--delay: 0.5s;">
            <img src="https://images.unsplash.com/photo-1593640408182-31c70c8268f5?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=60" alt="Computer Hardware" class="gallery-image">
          </div>
        </div>
        
        <!-- Image 6: Learning -->
        <div class="col-lg-4 col-md-6">
          <div class="gallery-item" data-bs-toggle="modal" data-bs-target="#galleryModal" data-img-src="https://images.unsplash.com/photo-1491841550275-5b462bf48569?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80" style="--delay: 0.6s;">
            <img src="https://i0.wp.com/coachkaushal.com/wp-content/uploads/2022/04/books.jpg?ssl=1" alt="Books and Learning" class="gallery-image">
          </div>

      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="text-center py-4">
    <p class="mb-0">© 2025 Ishan Tripathi. All rights reserved.</p>
  </footer>

  <!-- Gallery Lightbox Modal -->
  <div class="modal fade" id="galleryModal" tabindex="-1" aria-labelledby="galleryModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content">
        <div class="modal-header">
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <img src="" class="w-100" id="modalImage" alt="Gallery Image">
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Internal JS -->
  <script>
    console.log("Gallery loaded. Waiting for your awesome pics 📸");

    // --- Lightbox Functionality ---
    const galleryModal = document.getElementById('galleryModal');
    galleryModal.addEventListener('show.bs.modal', function (event) {
      // Button that triggered the modal
      const triggerElement = event.relatedTarget;
      // Get the image source from the data-img-src attribute
      const imageSrc = triggerElement.getAttribute('data-img-src');
      // Update the modal's image
      const modalImage = document.getElementById('modalImage');
      modalImage.src = imageSrc;
    });

    // --- Scroll-triggered Fade-in Animation ---
    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) {
          entry.target.classList.add('is-visible');
        }
      });
    }, {
      threshold: 0.1
    });

    const sectionsToAnimate = document.querySelectorAll('.fade-in-section');
    sectionsToAnimate.forEach((section) => {
      observer.observe(section);
    });
  </script>

</body>
</html>
